version: "3.8"

# ============================================================
# 文档发布系统（backend + frontend + docs）
#
# 使用方法:
#   1. docker-compose up -d --build
#   2. 管理后台：http://localhost:9280（登录：admin / admin123）
#   3. 后端 Swagger：http://localhost:8013/docs
#   4. 文档站点：http://localhost:9281（构建发布后可访问）
#
# 后端使用 JSON 文件存储数据，无需外部数据库。
# data/、uploads/、docs-dist/ 通过 volume 持久化。
# ============================================================

services:
  backend:
    build: ./backend
    image: vitedress-word-backend:latest
    container_name: vitedress-backend
    restart: unless-stopped
    environment:
      - APP_PORT=${APP_PORT:-8013}
      - UVICORN_WORKERS=${UVICORN_WORKERS:-2}
      - SECRET_KEY=${SECRET_KEY:-vitedress-word-secret-key-please-change}
      - DEFAULT_ADMIN_USER=${DEFAULT_ADMIN_USER:-admin}
      - DEFAULT_ADMIN_PASS=${DEFAULT_ADMIN_PASS:-admin123}
      - DOCS_DIR=/app/docs
    expose:
      - "8013"
    ports:
      - "8013:8013"
    volumes:
      - backend-data:/app/data
      - backend-uploads:/app/uploads
      - docs-dist:/app/docs/.vitepress/dist
    networks:
      - app-net

  frontend:
    build: ./frontend
    image: vitedress-word-frontend:latest
    container_name: vitedress-frontend
    restart: unless-stopped
    ports:
      - "9280:80"
    depends_on:
      - backend
    networks:
      - app-net

  docs:
    image: nginx:1.27-alpine
    container_name: vitedress-docs
    restart: unless-stopped
    ports:
      - "9281:80"
    volumes:
      - docs-dist:/usr/share/nginx/html:ro
      - ./docker/docs/nginx.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - backend
    networks:
      - app-net

volumes:
  backend-data:
  backend-uploads:
  docs-dist:

networks:
  app-net:
    driver: bridge
